  <style>
    :root {
      --bg: #0d0d11;
      --panel: #171821;
      --panel-soft: #1f2030;
      --text: #f5f4ef;
      --muted: #c6c5bc;
      --gold: #c7a56b;
      --accent: #8f6a74;
      --leaf: #6e845f;
      --line: #313243;
      --maxw: 1140px;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 90% -20%, #30354c 0%, transparent 60%),
        linear-gradient(180deg, #0d0d11 0%, #11121a 60%, #0d0d11 100%);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
    }

    .wrap {
      width: min(100% - 2rem, var(--maxw));
      margin: 0 auto;
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
      background: rgba(11, 11, 16, 0.88);
      border-bottom: 1px solid #282a3a;
    }

    .nav-row {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .show-item {
      border-radius: 12px;
      border: 1px solid rgba(199, 165, 107, 0.32);
      background: #161824;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease;
    }

    .show-item:hover {
      border-color: rgba(199, 165, 107, 0.55);
      background: #1a1c28;
    }

    .show-item.is-past {
      display: none;
    }

    .show-date-square {
      flex-shrink: 0;
      width: 4.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      padding: 0.55rem 0.35rem;
      border-radius: 10px;
      border: 1px solid rgba(199, 165, 107, 0.45);
      background: rgba(199, 165, 107, 0.07);
    }

    .show-date-day {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--gold);
    }

    .show-date-month {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .show-body {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.3rem;
      min-width: 0;
      flex: 1;
    }

    .show-act-pill {
      display: inline-block;
      max-width: 100%;
      padding: 0.28rem 0.75rem;
      border-radius: 999px;
      border: 1px solid #4a4c61;
      background: #1f2130;
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: 0.01em;
    }

    .show-datetime {
      margin: 0;
      color: #9aa3b8;
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.25;
    }

    .show-venue {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.35;
    }

    .show-venue-place {
      color: var(--text);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-row wrap">
      <a href="/" class="brand-lockup">
        <img src="/images/logo.png" alt="Sandy VaVoom" />
        <div>
          <p class="brand-title">Sandy VaVoom</p>
          <p class="brand-sub">Live Entertainment</p>
        </div>
      </a>
    </div>
  </nav>

  <main>
    <section class="wrap" style="padding: 3.1rem 0;">
      <h2>Upcoming Shows</h2>
      <div class="schedule-grid" id="upcomingShows"></div>
    </section>
  </main>

  <script>
    (function () {
      const SHOWS = [
        {
          date: new Date("2026-07-31"),
          act: "RetroActive",
          time: "7:00 PM - 10:00 PM",
          venue: "The Pour House",
          city: "Paso Robles"
        }
      ];

      function renderShows() {
        const container = document.getElementById("upcomingShows");
        const now = new Date();

        SHOWS.forEach(show => {
          if (show.date < now) return;

          const showEl = document.createElement("div");
          showEl.className = "show-item";
          showEl.innerHTML = `
            <div class="show-date-square">
              <div class="show-date-day">${show.date.getDate()}</div>
              <div class="show-date-month">${show.date.toLocaleString("en-US", { month: "short" })}</div>
            </div>
            <div class="show-body">
              <span class="show-act-pill">${show.act}</span>
              <p class="show-datetime">${show.time}</p>
              <p class="show-venue"><span class="show-venue-place">${show.venue}</span> — ${show.city}</p>
            </div>
          `;
          container.appendChild(showEl);
        });
      }

      renderShows();
    })();
  </script>
</body>
</html>
